<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Results | CBSE UAE Cluster Boys Volleyball Championship</title>
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
</head>
<body>
<header class="header" id="site-header"></header>

<section class="section">
  <div class="title">
    <small>Championship Centre</small>
    <h2>Results</h2>
    <p class="muted">Completed match results with set-by-set scores.</p>
  </div>
  <div id="results" class="grid2"><div class="card">Loading...</div></div>
</section>

<footer class="footer" id="site-footer"></footer>
<script src="components.js"></script>
<script>
renderLayout('results');
const API=getApiUrl();
function statusClass(s){return String(s||'').toLowerCase()==='live'?'live':''}
function renderMatch(m){
  const isLive = String(m.status||'').toLowerCase()==='live';
  const sets = setPillsHTML(m, 'teamACode', 'teamBCode');
  return `<article class="match-card-pro ${isLive?'live':''}">
    <div class="match-head-pro">
      <span class="match-label">${m.category||''}</span>
      <span class="match-status ${statusClass(m.status)}">${isLive?'<span class="live-dot"></span>':''}${m.status||'Scheduled'}</span>
    </div>
    <div class="match-meta-pro">${m.date||''} · ${m.time||''} · ${m.court||''}${m.matchNo?` · Match- ${m.matchNo}`:''}${m.roundNo?` · Round- ${m.roundNo}`:''}</div>
    <div class="score-board">
      <div class="score-team"><h3>${m.teamA||''}${m.teamACode?` <span style="color:var(--ink-faint);font-family:var(--mono);font-size:12px">(${m.teamACode})</span>`:''}</h3><strong>${m.scoreA||'0'}</strong></div>
      <div class="score-vs">VS</div>
      <div class="score-team"><h3>${m.teamB||''}${m.teamBCode?` <span style="color:var(--ink-faint);font-family:var(--mono);font-size:12px">(${m.teamBCode})</span>`:''}</h3><strong>${m.scoreB||'0'}</strong></div>
    </div>
    <div class="set-strip">${sets || '<span class="set-pill">Set scores to be updated</span>'}</div>
    ${m.currentSet?`<div class="current-set">Current Set: ${m.currentSet}</div>`:''}
    <div class="match-winner">Winner: ${m.winner||'To be updated'}</div>
  </article>`;
}
async function load(){
  const box=document.getElementById("results");
  try{
    const r=await fetch(API+"?action=results&cache="+Date.now());
    const d=await r.json();
    const data=d["results"]||[];
    box.innerHTML=data.map(renderMatch).join("") || '<div class="card">No records published yet.</div>';
  }catch(e){box.innerHTML='<div class="card">Unable to load data.</div>';}
}
load(); setInterval(load,30000);
</script>
</body>
</html>
