<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gallery | CBSE UAE Cluster Boys Volleyball Championship</title>
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
</head>
<body>
<header class="header" id="site-header"></header>

<section class="section">
  <div class="title"><small>Championship Gallery</small><h2>Moments from the Championship</h2></div>
  <div id="gallery" class="gallery-grid"></div>
</section>

<footer class="footer" id="site-footer"></footer>
<script src="components.js"></script>
<script>
renderLayout('gallery');
const API=getApiUrl();
async function load(){
  if(API.includes("PASTE")){gallery.innerHTML='<div class="gallery-img">Please connect Apps Script URL.</div>';return}
  try{
    const r=await fetch(API+'?action=gallery&cache='+Date.now());
    const d=await r.json();
    gallery.innerHTML=(d.gallery||[]).map(g=>`<div class="gallery-img">${g.url?`<img src="${g.url}" loading="lazy">`:'📸'}<p class="muted">${g.caption||''}</p></div>`).join('')||'<div class="gallery-img">Gallery will be updated soon.</div>';
  }catch(e){gallery.innerHTML='<div class="gallery-img">Unable to load gallery.</div>';}
}
load();
</script>
</body>
</html>
