<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Medal Tally | CBSE UAE Cluster Boys Volleyball Championship</title>
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
</head>
<body>
<header class="header" id="site-header"></header>

<section class="section">
  <div class="title"><small>Champions</small><h2>Medal Tally</h2><p class="muted">Champion, Runner-up and Third Place for each category.</p></div>
  <div class="tabs" id="catTabs">
    <button class="tab active" onclick="filterCat('All',this)">All</button>
    <button class="tab" onclick="filterCat('Boys U-14',this)">U-14</button>
    <button class="tab" onclick="filterCat('Boys U-17',this)">U-17</button>
    <button class="tab" onclick="filterCat('Boys U-19',this)">U-19</button>
  </div>
  <div id="medals" class="medal-grid"><div class="card">Loading medals...</div></div>
</section>

<footer class="footer" id="site-footer"></footer>
<script src="components.js"></script>
<script>
renderLayout('medals');
const API=getApiUrl();
let allMedals = [];
let activeCat = 'All';
function medalCard(m){
  const icon = m.position==='Champion'?'🥇':(m.position==='Runner-up'?'🥈':'🥉');
  return `<div class="medal-card">
    <span class="medal">${icon}</span>
    <h3>${m.position||''}</h3>
    <p><b>${m.category||''}</b></p>
    <p>${m.school||'To be updated'}</p>
  </div>`;
}
function render(){
  const rows = activeCat==='All' ? allMedals : allMedals.filter(m=>m.category===activeCat);
  medals.innerHTML = rows.map(medalCard).join('') || '<div class="card">Medal tally will be updated after finals.</div>';
}
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('#catTabs .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  render();
}
async function load(){
  try{
    const r=await fetch(API+"?action=medals&cache="+Date.now());
    const d=await r.json();
    allMedals = d.medals||[];
    render();
  }catch(e){medals.innerHTML='<div class="card">Unable to load medal tally.</div>';}
}
load();setInterval(load,30000);
</script>
</body>
</html>
