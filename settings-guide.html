<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portal Configuration Guide</title>
<script src="config.js"></script>
<style>
body{font-family:'Segoe UI',Arial,sans-serif;background:#f3f7ff;color:#061433;margin:0}
.wrap{max-width:1000px;margin:auto;padding:40px 20px}
.card{background:white;border-radius:22px;padding:25px;box-shadow:0 8px 24px rgba(0,0,0,.10);margin-bottom:20px}
h1,h2{color:#061433}
code{display:block;background:#020b20;color:#d7ff00;padding:14px;border-radius:12px;white-space:pre-wrap}
a{color:#0057ff;font-weight:800}
</style>
</head>
<body>
<div class="wrap">
  <h1>Phase 3 Configuration Guide</h1>
  <div class="card">
    <h2>Only file to edit every year</h2>
    <p>Edit <b>config.js</b> to change year, title, dates, links, venue, downloads and contact details.</p>
  </div>
  <div class="card">
    <h2>Current API URL</h2>
    <code id="api"></code>
  </div>
  <div class="card">
    <h2>Current Registration URL</h2>
    <code id="reg"></code>
  </div>
  <div class="card">
    <h2>Current Categories</h2>
    <code id="cat"></code>
  </div>
</div>
<script>
api.textContent = SITE_CONFIG.apiUrl;
reg.textContent = SITE_CONFIG.registrationUrl;
cat.textContent = SITE_CONFIG.categoriesText;
</script>
</body>
</html>
