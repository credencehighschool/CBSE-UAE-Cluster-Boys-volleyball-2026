<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Standings | CBSE UAE Cluster Boys Volleyball Championship</title>
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
</head>
<body>
<header class="header" id="site-header"></header>

<section class="section">
  <div class="title"><small>Automatic Standings</small><h2>Points Table</h2><p class="muted">Calculated automatically from completed matches.</p></div>
  <div id="standings">Loading...</div>
</section>

<footer class="footer" id="site-footer"></footer>
<script src="components.js"></script>
<script>
renderLayout('standings');
const API=getApiUrl();
async function load(){
  try{
    const r=await fetch(API+"?action=autoStandings&cache="+Date.now());
    const d=await r.json();
    const rows=d.standings||[];
    const groups={};
    rows.forEach(r=>{ if(!groups[r.category]) groups[r.category]=[]; groups[r.category].push(r); });
    standings.innerHTML=Object.keys(groups).map(cat=>`
      <h2 style="font-family:var(--display);text-transform:uppercase;font-size:20px;margin:25px 0 12px">${cat}</h2>
      <table class="table">
        <tr><th>Rank</th><th>Team</th><th>P</th><th>W</th><th>L</th><th>Sets</th><th>Points</th><th>Status</th></tr>
        ${groups[cat].map((s,i)=>`<tr class="${i===0?'rank1':''}"><td>${i+1}</td><td>${s.team}</td><td>${s.played}</td><td>${s.won}</td><td>${s.lost}</td><td>${s.setsFor}-${s.setsAgainst}</td><td>${s.points}</td><td>${i<2?'<span class="qualify">Qualification Zone</span>':'-'}</td></tr>`).join('')}
      </table>`).join("") || '<div class="card">Standings will appear after completed matches.</div>';
  }catch(e){standings.innerHTML='<div class="card">Unable to load standings.</div>';}
}
load(); setInterval(load,30000);
</script>
</body>
</html>
